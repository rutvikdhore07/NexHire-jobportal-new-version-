version: "3.9"
# NexHire — Local dev stack (PostgreSQL)
# Usage: docker compose up -d

services:
  db:
    image: postgres:16-alpine
    container_name: nexhire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexhire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
